name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npx tsc --noEmit

      - name: Test
        run: npm run test

  build:
    name: Build Library & CLI
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build:lib

      - name: Build CLI
        run: npm run build:cli

      - name: Verify output files
        run: |
          test -f dist/lib/index.mjs  || { echo "❌ missing dist/lib/index.mjs";  exit 1; }
          test -f dist/lib/index.cjs  || { echo "❌ missing dist/lib/index.cjs";  exit 1; }
          test -f dist/lib/index.d.ts || { echo "❌ missing dist/lib/index.d.ts"; exit 1; }
          test -f dist/lib/style.css  || { echo "❌ missing dist/lib/style.css";  exit 1; }
          test -f dist/bin/cli.cjs    || { echo "❌ missing dist/bin/cli.cjs";    exit 1; }
          echo "✅ All output files present"

      - name: Bundle size check
        run: |
          echo "=== Bundle Size ==="
          ls -lh dist/lib/
          MJS_SIZE=$(wc -c < dist/lib/index.mjs)
          CSS_SIZE=$(wc -c < dist/lib/style.css)
          echo "MJS : ${MJS_SIZE} bytes"
          echo "CSS : ${CSS_SIZE} bytes"
          MAX_MJS=307200
          if [ "$MJS_SIZE" -gt "$MAX_MJS" ]; then
            echo "❌ Bundle too large: ${MJS_SIZE} bytes (max: ${MAX_MJS} / 300 KB)"
            exit 1
          fi
          echo "✅ Bundle OK: ${MJS_SIZE} bytes (limit: ${MAX_MJS} / 300 KB)"
